<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disha's AWS Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #78A2D2, #FEFFAF);
            color: #333;
            text-align: center;
        }

        header {
            padding: 50px 20px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
        }

        .card {
            background: white;
            padding: 30px;
            margin: 30px auto;
            width: 80%;
            max-width: 500px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #78A2D2;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #5f89c7;
        }
    </style>
</head>

<body>

<header>
    <h1>🚀 Welcome to My AWS Website</h1>
    <p>Deployed using CodePipeline + S3</p>
</header>

<div class="card">
    <h2>Hi, I'm Disha 👩‍💻</h2>
    <p>I built this website using AWS CI/CD pipeline.</p>

    <button onclick="showMessage()">Click Me</button>
</div>

<script>
    function showMessage() {
        alert("🎉 Your AWS pipeline is working perfectly!");
    }
</script>

</body>
</html>
