<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Static Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #78A2D2, #FEFFAF);
            text-align: center;
        }

        header {
            background-color: #78A2D2;
            color: white;
            padding: 20px;
        }

        h1 {
            margin: 0;
        }

        .container {
            margin-top: 50px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        button {
            background-color: #78A2D2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #5a89c9;
        }

        footer {
            margin-top: 50px;
            padding: 10px;
            background: #78A2D2;
            color: white;
        }
    </style>
</head>

<body>

    <header>
        <h1>🚀 Welcome to My Website</h1>
        <p>Deployed using AWS S3 + CodePipeline</p>
    </header>

    <div class="container">

        <div class="card">
            <h2>Hello Disha 👋</h2>
            <p>This is your live static website.</p>
            <button onclick="showMessage()">Click Me</button>
        </div>

        <div class="card">
            <h3>💡 About This Project</h3>
            <p>
                This website is hosted on Amazon S3 and automatically deployed using AWS CodePipeline.
            </p>
        </div>

    </div>

    <footer>
        <p>Made with ❤️ by Disha</p>
    </footer>

    <script>
        function showMessage() {
            alert("🎉 Your AWS deployment is working perfectly!");
        }
    </script>

</body>
</html>
